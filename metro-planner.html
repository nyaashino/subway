<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地铁线路路径规划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-content {
            display: flex;
            gap: 20px;
        }

        .map-container {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 600px;
        }

        .info-panel {
            width: 350px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .selection-box {
            margin-bottom: 20px;
        }

        .selection-box h3 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .station-display {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: #f5f7fa;
            border-radius: 8px;
            min-height: 45px;
        }

        .station-display .label {
            font-weight: bold;
            color: #666;
        }

        .station-display .name {
            color: #1e3c72;
            font-weight: bold;
        }

        .start-marker {
            width: 16px;
            height: 16px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .end-marker {
            width: 16px;
            height: 16px;
            background: #e74c3c;
            border-radius: 50%;
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.4);
        }

        .btn-calculate:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-reset {
            background: #f5f7fa;
            color: #666;
        }

        .btn-reset:hover {
            background: #e8ecf1;
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-section h3 {
            color: #1e3c72;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1e3c72;
        }

        .path-info {
            background: #f5f7fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .path-info h4 {
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .path-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .station-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }

        .station-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
        }

        .station-item:last-child {
            border-bottom: none;
        }

        .station-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .transfer-badge {
            background: #f39c12;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .instruction {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            color: #856404;
            font-size: 14px;
        }

        .instruction h4 {
            margin-bottom: 8px;
        }

        .instruction ul {
            padding-left: 20px;
        }

        .instruction li {
            margin-bottom: 5px;
        }

        svg {
            width: 100%;
            height: 550px;
        }

        .station {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .station:hover circle {
            r: 10;
        }

        .station:hover text {
            font-weight: bold;
        }

        .station-circle {
            stroke: white;
            stroke-width: 2;
        }

        .station-text {
            font-size: 12px;
            fill: #333;
            pointer-events: none;
        }

        .line-1 { fill: #e74c3c; }
        .line-2 { fill: #3498db; }
        .line-3 { fill: #2ecc71; }
        .line-4 { fill: #9b59b6; }
        .line-5 { fill: #f39c12; }

        .line-path {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .line-path-1 { stroke: #e74c3c; }
        .line-path-2 { stroke: #3498db; }
        .line-path-3 { stroke: #2ecc71; }
        .line-path-4 { stroke: #9b59b6; }
        .line-path-5 { stroke: #f39c12; }

        .highlight-path {
            stroke: #f1c40f;
            stroke-width: 12;
            opacity: 0.7;
            z-index: 100;
        }

        .start-station circle {
            fill: #2ecc71 !important;
            stroke: #27ae60;
            stroke-width: 3;
            r: 12;
        }

        .end-station circle {
            fill: #e74c3c !important;
            stroke: #c0392b;
            stroke-width: 3;
            r: 12;
        }

        .transfer-station circle {
            fill: white;
            stroke-width: 3;
        }

        .path-station circle {
            r: 9;
            opacity: 0.9;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #666;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 13px;
            background: #e8ecf1;
            color: #666;
        }

        .tab-btn.active {
            background: #1e3c72;
            color: white;
        }
    </style>
</head>
<body>

                        <li><strong>选择终点：</strong>再次点击另一个站点设为终点</li>

    <script>
        const metroData = {
            lines: [
                { id: 1, name: '1号线', color: '#e74c3c' },
                { id: 2, name: '2号线', color: '#3498db' },
                { id: 3, name: '3号线', color: '#2ecc71' },
                { id: 4, name: '4号线', color: '#9b59b6' },
                { id: 5, name: '5号线', color: '#f39c12' }
            ],
            
            stations: [
                { id: 'S1', name: '东方广场', x: 450, y: 80, lines: [1, 2] },
                { id: 'S2', name: '中央公园', x: 450, y: 180, lines: [1, 3, 4] },
                { id: 'S3', name: '科技园', x: 450, y: 280, lines: [1, 5] },
                { id: 'S4', name: '大学城', x: 450, y: 380, lines: [1] },
                { id: 'S5', name: '体育中心', x: 450, y: 480, lines: [1] },
                
                { id: 'S6', name: '西湖', x: 150, y: 180, lines: [2] },
                { id: 'S7', name: '东门', x: 300, y: 180, lines: [2] },
                { id: 'S8', name: '南门', x: 600, y: 180, lines: [2] },
                { id: 'S9', name: '北站', x: 750, y: 180, lines: [2] },
                
                { id: 'S10', name: '金融区', x: 100, y: 280, lines: [3] },
                { id: 'S11', name: '会展中心', x: 250, y: 280, lines: [3] },
                { id: 'S12', name: '市民中心', x: 650, y: 280, lines: [3] },
                { id: 'S13', name: '机场', x: 800, y: 280, lines: [3] },
                
                { id: 'S14', name: '火车站', x: 200, y: 80, lines: [4] },
                { id: 'S15', name: '汽车站', x: 350, y: 80, lines: [4] },
                { id: 'S16', name: '购物中心', x: 550, y: 80, lines: [4] },
                { id: 'S17', name: '医院', x: 700, y: 80, lines: [4] },
                
                { id: 'S18', name: '文化广场', x: 200, y: 380, lines: [5] },
                { id: 'S19', name: '图书馆', x: 300, y: 380, lines: [5] },
                { id: 'S20', name: '博物馆', x: 600, y: 380, lines: [5] },
                { id: 'S21', name: '艺术馆', x: 750, y: 380, lines: [5] }
            ],
            
            connections: [
                { from: 'S1', to: 'S2', line: 1 },
                { from: 'S2', to: 'S3', line: 1 },
                { from: 'S3', to: 'S4', line: 1 },
                { from: 'S4', to: 'S5', line: 1 },
                
                { from: 'S6', to: 'S7', line: 2 },
                { from: 'S7', to: 'S1', line: 2 },
                { from: 'S1', to: 'S8', line: 2 },
                { from: 'S8', to: 'S9', line: 2 },
                
                { from: 'S10', to: 'S11', line: 3 },
                { from: 'S11', to: 'S2', line: 3 },
                { from: 'S2', to: 'S12', line: 3 },
                { from: 'S12', to: 'S13', line: 3 },
                
                { from: 'S14', to: 'S15', line: 4 },
                { from: 'S15', to: 'S1', line: 4 },
                { from: 'S1', to: 'S16', line: 4 },
                { from: 'S16', to: 'S17', line: 4 },
                
                { from: 'S18', to: 'S19', line: 5 },
                { from: 'S19', to: 'S3', line: 5 },
                { from: 'S3', to: 'S20', line: 5 },
                { from: 'S20', to: 'S21', line: 5 }
            ]
        };

        class MetroPlanner {
            constructor(data) {
                this.stations = data.stations;
                this.connections = data.connections;
                this.lines = data.lines;
                this.stationMap = new Map();
                this.adjacencyList = new Map();
                this.init();
            }
            
            init() {
                this.stations.forEach(s => this.stationMap.set(s.id, s));
                
                this.stations.forEach(s => this.adjacencyList.set(s.id, []));
                
                this.connections.forEach(conn => {
                    this.adjacencyList.get(conn.from).push({
                        to: conn.to,
                        line: conn.line,
                        station: this.stationMap.get(conn.to)
                    });
                    this.adjacencyList.get(conn.to).push({
                        to: conn.from,
                        line: conn.line,
                        station: this.stationMap.get(conn.from)
                    });
                });
            }
            
            getStation(id) {
                return this.stationMap.get(id);
            }
            
            findShortestPathByStations(startId, endId) {
                if (startId === endId) {
                    return { path: [startId], transfers: 0, stations: 0 };
                }
                
                const visited = new Set();
                const queue = [{ 
                    station: startId, 
                    path: [startId], 
                    line: null,
                    transfers: 0
                }];
                visited.add(startId);
                
                while (queue.length > 0) {
                    const current = queue.shift();
                    const neighbors = this.adjacencyList.get(current.station);
                    
                    for (const neighbor of neighbors) {
                        if (!visited.has(neighbor.to)) {
                            visited.add(neighbor.to);
                            
                            const newPath = [...current.path, neighbor.to];
                            let newTransfers = current.transfers;
                            
                            if (current.line !== null && current.line !== neighbor.line) {
                                newTransfers++;
                            }
                            
                            if (neighbor.to === endId) {
                                return {
                                    path: newPath,
                                    transfers: newTransfers,
                                    stations: newPath.length - 1
                                };
                            }
                            
                            queue.push({
                                station: neighbor.to,
                                path: newPath,
                                line: neighbor.line,
                                transfers: newTransfers
                            });
                        }
                    }
                }
                
                return null;
            }
            
            findShortestPathByTransfers(startId, endId) {
                if (startId === endId) {
                    return { path: [startId], transfers: 0, stations: 0 };
                }
                
                const startStation = this.getStation(startId);
                let bestResult = null;
                let minTransfers = Infinity;
                
                for (const startLine of startStation.lines) {
                    const visited = new Map();
                    const queue = [{ 
                        station: startId, 
                        path: [startId], 
                        line: startLine,
                        transfers: 0
                    }];
                    visited.set(startId + '-' + startLine, 0);
                    
                    while (queue.length > 0) {
                        const current = queue.shift();
                        
                        if (current.transfers > minTransfers) continue;
                        
                        if (current.station === endId) {
                            const stationCount = current.path.length - 1;
                            if (!bestResult || 
                                current.transfers < minTransfers ||
                                (current.transfers === minTransfers && stationCount < bestResult.stations)) {
                                bestResult = {
                                    path: current.path,
                                    transfers: current.transfers,
                                    stations: stationCount
                                };
                                minTransfers = current.transfers;
                            }
                            continue;
                        }
                        
                        const neighbors = this.adjacencyList.get(current.station);
                        
                        for (const neighbor of neighbors) {
                            const isSameLine = current.line === neighbor.line;
                            const newTransfers = isSameLine ? current.transfers : current.transfers + 1;
                            
                            if (newTransfers > minTransfers) continue;
                            
                            const visitKey = neighbor.to + '-' + neighbor.line;
                            const existingTransfers = visited.get(visitKey);
                            
                            if (existingTransfers === undefined || newTransfers < existingTransfers) {
                                visited.set(visitKey, newTransfers);
                                
                                const newPath = [...current.path, neighbor.to];
                                
                                const insertIndex = queue.findIndex(item => item.transfers > newTransfers);
                                if (insertIndex === -1) {
                                    queue.push({
                                        station: neighbor.to,
                                        path: newPath,
                                        line: neighbor.line,
                                        transfers: newTransfers
                                    });
                                } else {
                                    queue.splice(insertIndex, 0, {
                                        station: neighbor.to,
                                        path: newPath,
                                        line: neighbor.line,
                                        transfers: newTransfers
                                    });
                                }
                            }
                        }
                    }
                }
                
                return bestResult;
            }
            
            getPathWithDetails(path) {
                const details = [];
                let currentLine = null;
                
                for (let i = 0; i < path.length; i++) {
                    const stationId = path[i];
                    const station = this.getStation(stationId);
                    
                    let lines = [];
                    
                    if (i === 0 && path.length > 1) {
                        const nextStation = this.getStation(path[i + 1]);
                        for (const conn of this.connections) {
                            if ((conn.from === stationId && conn.to === path[i + 1]) ||
                                (conn.to === stationId && conn.from === path[i + 1])) {
                                lines = [conn.line];
                                currentLine = conn.line;
                                break;
                            }
                        }
                    } else if (i === path.length - 1 && path.length > 1) {
                        lines = [currentLine];
                    } else if (path.length > 1) {
                        const prevStation = path[i - 1];
                        const nextStation = path[i + 1];
                        
                        let prevLine = null;
                        let nextLine = null;
                        
                        for (const conn of this.connections) {
                            if ((conn.from === stationId && conn.to === prevStation) ||
                                (conn.to === stationId && conn.from === prevStation)) {
                                prevLine = conn.line;
                            }
                            if ((conn.from === stationId && conn.to === nextStation) ||
                                (conn.to === stationId && conn.from === nextStation)) {
                                nextLine = conn.line;
                            }
                        }
                        
                        if (prevLine !== nextLine) {
                            lines = [prevLine, nextLine];
                            currentLine = nextLine;
                        } else {
                            lines = [prevLine];
                            currentLine = prevLine;
                        }
                    } else {
                        lines = station.lines;
                    }
                    
                    details.push({
                        id: stationId,
                        name: station.name,
                        lines: lines,
                        isTransfer: lines.length > 1 && station.lines.length > 1,
                        x: station.x,
                        y: station.y
                    });
                }
                
                return details;
            }
        }

        class MetroRenderer {
            constructor(planner, svgId) {
                this.planner = planner;
                this.svg = document.getElementById(svgId);
                this.startStation = null;
                this.endStation = null;
                this.currentPath = null;
                this.highlightedPathType = 'stations';
                
                this.init();
            }
            
            init() {
                this.renderMap();
                this.bindEvents();
            }
            
            renderMap() {
                this.svg.innerHTML = '';
                
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                
                const linePaths = new Map();
                
                for (let lineId = 1; lineId <= 5; lineId++) {
                    const lineConnections = this.planner.connections.filter(c => c.line === lineId);
                    const lineStations = new Set();
                    
                    lineConnections.forEach(c => {
                        lineStations.add(c.from);
                        lineStations.add(c.to);
                    });
                    
                    const paths = this.buildLinePaths(lineConnections, lineId);
                    linePaths.set(lineId, paths);
                }
                
                this.renderLinePaths(linePaths);
                this.renderStations();
            }
            
            buildLinePaths(connections, lineId) {
                const paths = [];
                const visited = new Set();
                
                for (const conn of connections) {
                    if (!visited.has(`${conn.from}-${conn.to}`) && !visited.has(`${conn.to}-${conn.from}`)) {
                        visited.add(`${conn.from}-${conn.to}`);
                        
                        const fromStation = this.planner.getStation(conn.from);
                        const toStation = this.planner.getStation(conn.to);
                        
                        paths.push({
                            from: { x: fromStation.x, y: fromStation.y, id: conn.from },
                            to: { x: toStation.x, y: toStation.y, id: conn.to },
                            line: lineId
                        });
                    }
                }
                
                return paths;
            }
            
            renderLinePaths(linePaths) {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('id', 'line-paths');
                
                for (const [lineId, paths] of linePaths) {
                    for (const path of paths) {
                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', path.from.x);
                        line.setAttribute('y1', path.from.y);
                        line.setAttribute('x2', path.to.x);
                        line.setAttribute('y2', path.to.y);
                        line.setAttribute('class', `line-path line-path-${lineId}`);
                        line.setAttribute('data-line', lineId);
                        line.setAttribute('data-from', path.from.id);
                        line.setAttribute('data-to', path.to.id);
                        g.appendChild(line);
                    }
                }
                
                this.svg.appendChild(g);
            }
            
            renderStations() {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('id', 'stations');
                
                for (const station of this.planner.stations) {
                    const stationGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    stationGroup.setAttribute('class', 'station');
                    stationGroup.setAttribute('data-id', station.id);
                    
                    if (station.lines.length > 1) {
                        for (let i = station.lines.length - 1; i >= 0; i--) {
                            const line = station.lines[i];
                            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            circle.setAttribute('cx', station.x);
                            circle.setAttribute('cy', station.y);
                            circle.setAttribute('r', 8 + i * 4);
                            circle.setAttribute('class', `station-circle line-${line}`);
                            stationGroup.appendChild(circle);
                        }
                        
                        const outerCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        outerCircle.setAttribute('cx', station.x);
                        outerCircle.setAttribute('cy', station.y);
                        outerCircle.setAttribute('r', 6);
                        outerCircle.setAttribute('fill', 'white');
                        outerCircle.setAttribute('stroke', '#333');
                        outerCircle.setAttribute('stroke-width', '2');
                        stationGroup.appendChild(outerCircle);
                    } else {
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', station.x);
                        circle.setAttribute('cy', station.y);
                        circle.setAttribute('r', 8);
                        circle.setAttribute('class', `station-circle line-${station.lines[0]}`);
                        stationGroup.appendChild(circle);
                    }
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', station.x);
                    text.setAttribute('y', station.y + 22);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('class', 'station-text');
                    text.textContent = station.name;
                    stationGroup.appendChild(text);
                    
                    g.appendChild(stationGroup);
                }
                
                this.svg.appendChild(g);
            }
            
            bindEvents() {
                const stations = this.svg.querySelectorAll('.station');
                stations.forEach(station => {
                    station.addEventListener('click', (e) => {
                        const stationId = station.getAttribute('data-id');
                        this.handleStationClick(stationId);
                    });
                });
                
                document.getElementById('btn-calculate').addEventListener('click', () => {
                    this.calculatePath();
                });
                
                document.getElementById('btn-reset').addEventListener('click', () => {
                    this.reset();
                });
                
                document.getElementById('tab-stations').addEventListener('click', () => {
                    this.switchTab('stations');
                });
                
                document.getElementById('tab-transfers').addEventListener('click', () => {
                    this.switchTab('transfers');
                });
            }
            
            handleStationClick(stationId) {
                const station = this.planner.getStation(stationId);
                
                if (!this.startStation) {
                    this.startStation = stationId;
                    this.updateStationDisplay('start', station.name);
                    this.highlightStation(stationId, 'start');
                } else if (!this.endStation && stationId !== this.startStation) {
                    this.endStation = stationId;
                    this.updateStationDisplay('end', station.name);
                    this.highlightStation(stationId, 'end');
                    document.getElementById('btn-calculate').disabled = false;
                } else if (stationId === this.startStation || stationId === this.endStation) {
                    return;
                } else {
                    this.clearStationHighlight(this.endStation);
                    this.endStation = stationId;
                    this.updateStationDisplay('end', station.name);
                    this.highlightStation(stationId, 'end');
                }
            }
            
            updateStationDisplay(type, name) {
                const element = document.getElementById(`${type}-station-name`);
                element.textContent = name;
            }
            
            highlightStation(stationId, type) {
                const station = this.svg.querySelector(`.station[data-id="${stationId}"]`);
                if (station) {
                    station.classList.add(`${type}-station`);
                }
            }
            
            clearStationHighlight(stationId) {
                if (!stationId) return;
                const station = this.svg.querySelector(`.station[data-id="${stationId}"]`);
                if (station) {
                    station.classList.remove('start-station', 'end-station', 'path-station');
                }
            }
            
            calculatePath() {
                if (!this.startStation || !this.endStation) return;
                
                const stationsResult = this.planner.findShortestPathByStations(
                    this.startStation, 
                    this.endStation
                );
                
                const transfersResult = this.planner.findShortestPathByTransfers(
                    this.startStation, 
                    this.endStation
                );
                
                this.currentPath = {
                    stations: stationsResult,
                    transfers: transfersResult
                };
                
                this.displayResults();
                this.highlightPath();
                
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('instruction').style.display = 'none';
            }
            
            displayResults() {
                if (!this.currentPath) return;
                
                this.displayPathResult('stations', this.currentPath.stations);
                this.displayPathResult('transfers', this.currentPath.transfers);
            }
            
            displayPathResult(type, result) {
                if (!result) {
                    document.getElementById(`${type}-stats`).innerHTML = '<p style="color: #e74c3c;">未找到路径</p>';
                    document.getElementById(`${type}-list`).innerHTML = '';
                    return;
                }
                
                const statsHtml = `
                    <div class="stat">
                        <div class="stat-value">${result.stations}</div>
                        <div class="stat-label">站数</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${result.transfers}</div>
                        <div class="stat-label">换乘</div>
                    </div>
                `;
                document.getElementById(`${type}-stats`).innerHTML = statsHtml;
                
                const details = this.planner.getPathWithDetails(result.path);
                const listHtml = details.map((station, index) => {
                    const color = this.planner.lines.find(l => l.id === station.lines[0])?.color || '#333';
                    const transferBadge = station.isTransfer ? 
                        `<span class="transfer-badge">换乘 ${this.planner.lines.find(l => l.id === station.lines[1])?.name || ''}</span>` : '';
                    
                    return `
                        <div class="station-item">
                            <div class="station-dot" style="background: ${color};"></div>
                            <span>${index + 1}. ${station.name}</span>
                            ${transferBadge}
                        </div>
                    `;
                }).join('');
                
                document.getElementById(`${type}-list`).innerHTML = listHtml;
            }
            
            highlightPath() {
                this.clearPathHighlight();
                
                const type = this.highlightedPathType;
                const result = this.currentPath?.[type];
                
                if (!result) return;
                
                const details = this.planner.getPathWithDetails(result.path);
                
                for (let i = 0; i < details.length - 1; i++) {
                    const from = details[i];
                    const to = details[i + 1];
                    this.drawHighlightSegment(from, to, i);
                }
                
                details.forEach(detail => {
                    if (detail.id !== this.startStation && detail.id !== this.endStation) {
                        const station = this.svg.querySelector(`.station[data-id="${detail.id}"]`);
                        if (station) {
                            station.classList.add('path-station');
                        }
                    }
                });
            }
            
            drawHighlightSegment(from, to, index) {
                const linePaths = this.svg.getElementById('line-paths');
                const highlightLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                highlightLine.setAttribute('x1', from.x);
                highlightLine.setAttribute('y1', from.y);
                highlightLine.setAttribute('x2', to.x);
                highlightLine.setAttribute('y2', to.y);
                highlightLine.setAttribute('class', 'highlight-path');
                highlightLine.setAttribute('id', `highlight-${index}`);
                highlightLine.style.zIndex = '100';
                
                const firstChild = linePaths.firstChild;
                if (firstChild) {
                    linePaths.insertBefore(highlightLine, firstChild);
                } else {
                    linePaths.appendChild(highlightLine);
                }
                
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.appendChild(highlightLine);
                this.svg.insertBefore(g, linePaths);
            }
            
            clearPathHighlight() {
                const highlights = this.svg.querySelectorAll('.highlight-path');
                highlights.forEach(h => h.remove());
                
                const pathStations = this.svg.querySelectorAll('.path-station');
                pathStations.forEach(s => s.classList.remove('path-station'));
            }
            
            switchTab(type) {
                this.highlightedPathType = type;
                
                document.getElementById('tab-stations').classList.toggle('active', type === 'stations');
                document.getElementById('tab-transfers').classList.toggle('active', type === 'transfers');
                
                document.getElementById('stations-result').style.display = type === 'stations' ? 'block' : 'none';
                document.getElementById('transfers-result').style.display = type === 'transfers' ? 'block' : 'none';
                
                if (this.currentPath) {
                    this.highlightPath();
                }
            }
            
            reset() {
                this.clearPathHighlight();
                this.clearStationHighlight(this.startStation);
                this.clearStationHighlight(this.endStation);
                
                this.startStation = null;
                this.endStation = null;
                this.currentPath = null;
                this.highlightedPathType = 'stations';
                
                this.updateStationDisplay('start', '请点击地图选择');
                this.updateStationDisplay('end', '请点击地图选择');
                
                document.getElementById('btn-calculate').disabled = true;
                document.getElementById('result-container').style.display = 'none';
                document.getElementById('instruction').style.display = 'block';
                
                document.getElementById('tab-stations').classList.add('active');
                document.getElementById('tab-transfers').classList.remove('active');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const planner = new MetroPlanner(metroData);
            const renderer = new MetroRenderer(planner, 'metro-svg');
        });
    </script>
</body>
</html>
